<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>时光穿梭机 · 看见你的一生</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    :root {
      --ink: #1a1a2e;
      --ink-soft: #2d2d4e;
      --ink-muted: #6b6b8a;
      --paper: #faf8f4;
      --paper-warm: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --gold-dim: rgba(201,168,76,0.15);
      --star: #e8e0f0;
      --accent: #7b6fa0;
      --accent-light: #a99dc8;
      --glow: rgba(123,111,160,0.3);
      --radius: 16px;
      --transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--ink);
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--paper);
      overflow: hidden;
    }

    /* ── 星空背景 ── */
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--star);
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: var(--min-op, 0.2); transform: scale(1); }
      50% { opacity: var(--max-op, 0.8); transform: scale(1.3); }
    }

    /* ── 流星 ── */
    .meteor {
      position: absolute;
      width: 2px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--gold-light), transparent);
      border-radius: 2px;
      animation: meteor-fall 1.2s ease-in forwards;
      transform-origin: top center;
    }
    @keyframes meteor-fall {
      0% { opacity: 1; transform: translateY(-20px) rotate(35deg); }
      100% { opacity: 0; transform: translateY(300px) rotate(35deg); }
    }

    /* ── 主容器 ── */
    #app {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px;
    }

    /* ── 屏幕切换 ── */
    .screen {
      display: none;
      width: 100%; max-width: 420px;
      animation: fadeSlideUp 0.5s ease forwards;
    }
    .screen.active { display: flex; flex-direction: column; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 欢迎屏 ── */
    #screen-welcome {
      align-items: center; text-align: center; gap: 0;
    }

    .orb {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--accent-light), var(--accent), #4a3d70);
      box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(123,111,160,0.15);
      margin-bottom: 28px;
      position: relative;
      animation: orb-pulse 4s ease-in-out infinite;
    }
    .orb::after {
      content: '';
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.3);
      animation: orb-ring 4s ease-in-out infinite;
    }
    @keyframes orb-pulse {
      0%, 100% { box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(123,111,160,0.15); }
      50% { box-shadow: 0 0 60px var(--glow), 0 0 120px rgba(123,111,160,0.2); }
    }
    @keyframes orb-ring {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.08); opacity: 0.8; }
    }

    .welcome-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 28px; font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--paper);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .welcome-subtitle {
      font-size: 14px; color: var(--ink-muted);
      line-height: 1.8; letter-spacing: 0.04em;
      margin-bottom: 48px;
      max-width: 280px;
    }

    .divider {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 24px;
    }

    /* ── 按钮 ── */
    .btn-primary {
      width: 100%; padding: 16px 24px; min-height: 54px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #5a4d80);
      color: var(--paper); font-family: 'Noto Sans SC', sans-serif;
      font-size: 16px; font-weight: 500; letter-spacing: 0.06em;
      text-indent: 0.06em; line-height: 1.5;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(123,111,160,0.4);
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative; overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:hover::before { opacity: 1; }

    .btn-ghost {
      background: transparent; border: 1px solid rgba(255,255,255,0.15);
      color: var(--ink-muted); font-size: 14px;
      padding: 12px; border-radius: 10px;
      cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
      transition: all 0.3s; margin-top: 12px; width: 100%;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.3); color: var(--paper); }

    /* ── 问卷屏 ── */
    #screen-question {
      gap: 0;
    }

    .q-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none;
      color: var(--ink-muted); font-size: 13px;
      cursor: pointer; padding: 0 0 20px 0;
      transition: color 0.2s;
      opacity: 0; pointer-events: none;
      align-self: flex-start;
    }
    .q-back-btn.visible { opacity: 1; pointer-events: auto; }
    .q-back-btn:hover { color: var(--accent-light); }
    .q-back-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .progress-bar-wrap {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
      margin-bottom: 32px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .q-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .q-age-badge {
      display: inline-flex; align-items: center;
      padding: 4px 10px; border-radius: 20px;
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.3);
      font-size: 11px; color: var(--gold);
      letter-spacing: 0.05em; font-weight: 500;
    }
    .q-num {
      font-size: 12px; color: var(--ink-muted);
      margin-left: auto;
    }

    .q-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px; font-weight: 600;
      line-height: 1.6; letter-spacing: 0.03em;
      color: var(--paper);
      margin-bottom: 8px;
      min-height: 80px;
    }

    .q-scene {
      font-size: 13px; color: var(--ink-muted);
      line-height: 1.7; margin-bottom: 28px;
      font-style: italic;
    }

    .options-list {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 0;
    }

    .option-btn {
      width: 100%; padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: var(--paper); font-family: 'Noto Sans SC', sans-serif;
      font-size: 14px; line-height: 1.5; text-align: left;
      cursor: pointer;
      transition: all 0.25s;
      position: relative; overflow: hidden;
    }
    .option-btn::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent);
      opacity: 0; transition: opacity 0.25s;
      border-radius: 3px 0 0 3px;
    }
    .option-btn:active { transform: scale(0.98); }
    .option-btn:hover, .option-btn.selected {
      border-color: rgba(123,111,160,0.5);
      background: rgba(123,111,160,0.12);
    }
    .option-btn.selected::before { opacity: 1; }
    .option-btn.selected { border-color: var(--accent); }

    /* ── 加载屏 ── */
    #screen-loading {
      align-items: center; text-align: center; gap: 0;
    }

    .loading-orb {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold), #a07a20);
      box-shadow: 0 0 40px rgba(201,168,76,0.4);
      margin-bottom: 24px;
      animation: loading-spin 2s linear infinite;
      position: relative;
    }
    .loading-orb::after {
      content: '';
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1px dashed rgba(201,168,76,0.3);
      animation: loading-spin-reverse 3s linear infinite;
    }
    @keyframes loading-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes loading-spin-reverse {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    .loading-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px; color: var(--paper);
      margin-bottom: 8px;
    }
    .loading-sub {
      font-size: 13px; color: var(--ink-muted);
      animation: loading-dots 1.5s steps(3, end) infinite;
    }
    @keyframes loading-dots {
      0%   { content: '正在推演'; }
      33%  { content: '正在推演·'; }
      66%  { content: '正在推演··'; }
      100% { content: '正在推演···'; }
    }

    /* ── 结果屏 ── */
    #screen-result {
      gap: 0;
      overflow-y: auto;
      max-height: calc(100vh - 48px);
      padding-bottom: 80px;
      scrollbar-width: none;
    }
    #screen-result::-webkit-scrollbar { display: none; }

    .result-header {
      text-align: center; margin-bottom: 28px;
    }

    .result-label {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.1));
      border: 1px solid rgba(201,168,76,0.4);
      font-size: 11px; color: var(--gold);
      letter-spacing: 0.15em; font-weight: 500;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .result-tag {
      font-family: 'Noto Serif SC', serif;
      font-size: 36px; font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--accent-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .result-subtitle {
      font-size: 13px; color: var(--ink-muted);
      letter-spacing: 0.06em;
    }

    .result-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
    }

    .result-card-title {
      font-size: 11px; color: var(--gold);
      letter-spacing: 0.12em; font-weight: 500;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .result-card-text {
      font-size: 14px; color: rgba(255,255,255,0.85);
      line-height: 1.9; letter-spacing: 0.02em;
    }

    .timeline-list {
      list-style: none;
      display: flex; flex-direction: column; gap: 0;
    }

    .timeline-item {
      display: flex; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }
    .timeline-item:last-child { border-bottom: none; }

    .timeline-age {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(123,111,160,0.15);
      border: 1px solid rgba(123,111,160,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--accent-light);
      font-weight: 500;
    }

    .timeline-content { flex: 1; }
    .timeline-event {
      font-size: 13px; color: rgba(255,255,255,0.8);
      line-height: 1.7;
    }
    .timeline-event em {
      color: var(--gold); font-style: normal;
    }

    .traits-wrap {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .trait-chip {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }
    .trait-chip.highlight {
      background: rgba(123,111,160,0.15);
      border-color: rgba(123,111,160,0.35);
      color: var(--accent-light);
    }

    /* ── 工具 ── */
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }

    /* ── 滚动提示 ── */
    .scroll-hint {
      text-align: center; font-size: 12px;
      color: var(--ink-muted); margin-top: 16px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    /* ── 分享按钮 ── */
    .btn-share {
      width: 100%; padding: 14px 24px; min-height: 50px;
      border: 1.5px solid rgba(201,168,76,0.5); border-radius: 12px;
      background: rgba(201,168,76,0.08);
      color: var(--gold-light); font-family: 'Noto Sans SC', sans-serif;
      font-size: 15px; font-weight: 500; letter-spacing: 0.06em;
      text-indent: 0.06em; line-height: 1.5;
      cursor: pointer; margin-top: 12px;
      transition: background 0.25s, border-color 0.25s;
    }
    .btn-share:active { background: rgba(201,168,76,0.15); }

    /* ── 分享 Modal ── */
    #share-modal {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.78);
      align-items: center; justify-content: center;
      padding: 24px;
    }
    #share-modal.open { display: flex; }
    .share-modal-inner {
      width: 100%; max-width: 380px;
      background: #1a1a2e;
      border-radius: 20px;
      padding: 20px;
      display: flex; flex-direction: column; align-items: center;
      gap: 14px;
    }
    .share-modal-title {
      font-size: 14px; color: var(--ink-muted); text-align: center;
    }
    #share-preview {
      width: 100%; border-radius: 12px;
      display: block;
    }
    .share-modal-hint {
      font-size: 12px; color: var(--ink-muted); text-align: center;
      line-height: 1.6;
    }
    .share-modal-close {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: rgba(255,255,255,0.08); color: var(--paper);
      font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="app">

  <!-- 欢迎屏 -->
  <div id="screen-welcome" class="screen active">
    <div class="orb"></div>
    <h1 class="welcome-title">时光穿梭机</h1>
    <div class="divider"></div>
    <p class="welcome-subtitle">
      十个问题，跨越你的一生<br>
      从懵懂少年到暮年回望<br>
      看见命运为你安排的样子
    </p>
    <button class="btn-primary" onclick="startJourney()">开始我的旅程</button>
    <button class="btn-ghost" onclick="showAbout()">这是什么？</button>
  </div>

  <!-- 问卷屏 -->
  <div id="screen-question" class="screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <button class="q-back-btn" id="q-back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      上一题
    </button>
    <div class="q-meta">
      <span class="q-age-badge" id="q-age-badge">童年</span>
      <span class="q-num" id="q-num">1 / 10</span>
    </div>
    <p class="q-text" id="q-text"></p>
    <p class="q-scene" id="q-scene"></p>
    <div class="options-list" id="options-list"></div>
  </div>

  <!-- 加载屏 -->
  <div id="screen-loading" class="screen">
    <div class="loading-orb"></div>
    <p class="loading-text">正在窥探你的人生</p>
    <p class="loading-sub" id="loading-sub">正在推演</p>
  </div>

  <!-- 结果屏 -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <div class="result-label">你的人生标签</div>
      <div class="result-tag" id="result-tag"></div>
      <div class="result-subtitle" id="result-subtitle"></div>
    </div>

    <div class="result-card">
      <div class="result-card-title">命运预言</div>
      <div class="result-card-text" id="result-prophecy"></div>
    </div>

    <div class="result-card">
      <div class="result-card-title">人生轨迹</div>
      <ul class="timeline-list" id="result-timeline"></ul>
    </div>

    <div class="result-card">
      <div class="result-card-title">性格特质</div>
      <div class="traits-wrap" id="result-traits"></div>
    </div>

    <div class="result-card">
      <div class="result-card-title">70 岁时的你</div>
      <div class="result-card-text" id="result-old-age"></div>
    </div>

    <button class="btn-primary mt-24" onclick="restart()">再穿梭一次</button>
    <button class="btn-share" onclick="openShareModal()">✦ 生成分享图片</button>
    <div class="scroll-hint">↓ 向下滑动查看完整预言</div>
  </div>

</div>

<!-- 分享图 Modal -->
<div id="share-modal">
  <div class="share-modal-inner">
    <div class="share-modal-title">长按图片保存，分享到朋友圈</div>
    <img id="share-preview" src="" alt="分享图片" />
    <div class="share-modal-hint">iOS：长按图片 → 存储到相册<br>Android：长按图片 → 下载图片</div>
    <button class="share-modal-close" onclick="closeShareModal()">关闭</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  星空
// ─────────────────────────────────────────
(function initStars() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createStars() {
    stars = [];
    const count = Math.floor((W * H) / 4000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        op: Math.random(),
        speed: Math.random() * 0.008 + 0.003,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    frame += 0.01;
    stars.forEach(s => {
      const op = 0.2 + 0.6 * (0.5 + 0.5 * Math.sin(frame * s.speed * 100 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,215,240,${op})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize(); createStars(); draw();
  window.addEventListener('resize', () => { resize(); createStars(); });

  // 偶尔产生流星
  function spawnMeteor() {
    const m = document.createElement('div');
    m.className = 'meteor';
    m.style.left = Math.random() * 80 + 10 + '%';
    m.style.top = Math.random() * 40 + '%';
    document.body.appendChild(m);
    setTimeout(() => m.remove(), 1400);
  }
  setInterval(() => { if (Math.random() < 0.4) spawnMeteor(); }, 3000);
})();

// ─────────────────────────────────────────
//  题库（50 道，每次随机抽 10）
// ─────────────────────────────────────────
const QUESTION_BANK = [
  // ── 童年 ──
  {
    age: '童年 · 7岁', ageGroup: 'child',
    text: '放学路上，你捡到了一枚金光闪闪的硬币。你会？',
    scene: '夕阳把影子拉得很长，同学们已经走远了。',
    options: [
      { text: '交给老师，心里踏实', weights: { stable: 2, moral: 3, social: 1 } },
      { text: '留着，买一根冰棒', weights: { pleasure: 2, practical: 2, solo: 1 } },
      { text: '找到失主还回去', weights: { empathy: 3, moral: 2, social: 2 } },
      { text: '存起来，攒钱买喜欢的书', weights: { intellectual: 3, future: 2, solo: 1 } }
    ]
  },
  {
    age: '童年 · 8岁', ageGroup: 'child',

let selectedQuestions = [];

let answerHistory = []; // 每元素: { weights: {...} }

  adventure: 0, stable: 0, family: 0, career: 0, social: 0,
  empathy: 0, moral: 0, intellectual: 0, creative: 0, ambition: 0,
  introvert: 0, pleasure: 0, practical: 0, solo: 0, future: 0, sensitive: 0

// ─────────────────────────────────────────
//  工具
// ─────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(() => el.classList.add('active'));
}

function switchScreen(id) {
  const current = document.querySelector('.screen.active');
  if (current) {
    current.style.opacity = '0';
    current.style.transform = 'translateY(-16px)';
    current.style.transition = 'opacity 0.3s, transform 0.3s';
    setTimeout(() => {
      current.classList.remove('active');
      current.style.display = 'none';
      current.style.opacity = '';
      current.style.transform = '';
      current.style.transition = '';
      showScreen(id);
    }, 300);
  } else {
    showScreen(id);
  }
}

// ─────────────────────────────────────────
//  按照阶段分层抽题，保证每阶段都有覆盖
// ─────────────────────────────────────────
function pickQuestions() {
  const groups = { child: [], teen: [], young: [], middle: [], senior: [], elder: [] };
  QUESTION_BANK.forEach(q => groups[q.ageGroup].push(q));
  const result = [];

  // 各阶段分配：童年2，青少年2，青年2，中年2，中老年1，退休1
  const plan = [
    ['child', 2], ['teen', 2], ['young', 2], ['middle', 2], ['senior', 1], ['elder', 1]
  ];
  plan.forEach(([group, count]) => {
    // 给每道题附加随机分值再排序，比纯 shuffle 更均匀分散
    const pool = groups[group].map(q => ({ q, r: Math.random() }));
    pool.sort((a, b) => a.r - b.r);
    result.push(...pool.slice(0, Math.min(count, pool.length)).map(x => x.q));
  });

  // 整体再随机排列，年龄段顺序也随机，不是永远从童年开始
  return shuffle(result);
}

// ─────────────────────────────────────────
//  流程
// ─────────────────────────────────────────
function startJourney() {
  // 重置
  scores = { adventure: 0, stable: 0, family: 0, career: 0, social: 0,
    empathy: 0, moral: 0, intellectual: 0, creative: 0, ambition: 0,
    introvert: 0, pleasure: 0, practical: 0, solo: 0, future: 0, sensitive: 0 };
  currentQ = 0;
  answerHistory = [];
  selectedQuestions = pickQuestions();
  switchScreen('screen-question');
  setTimeout(renderQuestion, 400);
}

function renderQuestion() {
  const q = selectedQuestions[currentQ];
  const total = selectedQuestions.length;

  document.getElementById('progress-fill').style.width = (currentQ / total * 100) + '%';
  document.getElementById('q-age-badge').textContent = q.age;
  document.getElementById('q-num').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-scene').textContent = q.scene;

  // 返回按钮：第一题隐藏，之后显示
  const backBtn = document.getElementById('q-back-btn');
  backBtn.classList.toggle('visible', currentQ > 0);

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  shuffle(q.options).forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.onclick = () => selectOption(opt, btn);
    list.appendChild(btn);
  });
}

function selectOption(opt, btnEl) {
  // 视觉反馈
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');

  // 保存本题答案到历史（用于返回时撤销）
  answerHistory[currentQ] = { weights: { ...opt.weights } };

  // 累加权重
  Object.entries(opt.weights).forEach(([key, val]) => {
    if (scores[key] !== undefined) scores[key] += val;
    else scores[key] = val;
  });

  // 延迟进入下一题
  setTimeout(() => {
    currentQ++;
    if (currentQ < selectedQuestions.length) {
      // 问题过渡动画
      const qScreen = document.getElementById('screen-question');
      qScreen.style.opacity = '0';
      qScreen.style.transform = 'translateY(12px)';
      qScreen.style.transition = 'opacity 0.25s, transform 0.25s';
      setTimeout(() => {
        qScreen.style.opacity = '';
        qScreen.style.transform = '';
        qScreen.style.transition = '';
        renderQuestion();
      }, 280);
    } else {
      // 最后进度100%
      document.getElementById('progress-fill').style.width = '100%';
      setTimeout(showLoading, 400);
    }
  }, 350);
}

function goBack() {
  if (currentQ <= 0) return;
  // 撤销上一题的权重
  const prev = answerHistory[currentQ - 1];
  if (prev) {
    Object.entries(prev.weights).forEach(([key, val]) => {
      if (scores[key] !== undefined) scores[key] -= val;
    });
    delete answerHistory[currentQ - 1];
  }
  currentQ--;
  // 过渡动画（反向）
  const qScreen = document.getElementById('screen-question');
  qScreen.style.opacity = '0';
  qScreen.style.transform = 'translateY(-12px)';
  qScreen.style.transition = 'opacity 0.2s, transform 0.2s';
  setTimeout(() => {
    qScreen.style.opacity = '';
    qScreen.style.transform = '';
    qScreen.style.transition = '';
    renderQuestion();
  }, 220);
}

function showLoading() {
  switchScreen('screen-loading');
  const msgs = ['正在推演', '时光倒流中', '命运核算中', '星盘校准中', '人生预言生成中'];
  let idx = 0;
  const sub = document.getElementById('loading-sub');
  const interval = setInterval(() => {
    sub.textContent = msgs[idx % msgs.length] + '···';
    idx++;
  }, 600);
  setTimeout(() => {
    clearInterval(interval);
    computeResult();
  }, 2800);
}

// ─────────────────────────────────────────
//  计算结局
// ─────────────────────────────────────────
function computeResult() {
  let best = null;
  let bestScore = -Infinity;

  DESTINIES.forEach(d => {
    const s = scores[d.scoreKey] || 0;
    // 加入随机扰动，同分时随机选
    const jitter = Math.random() * 2;
    if (s + jitter > bestScore) {
      bestScore = s + jitter;
      best = d;
    }
  });

  // 阈值不够时，随机加权备选
  if (bestScore < 3) {
    best = DESTINIES[Math.floor(Math.random() * DESTINIES.length)];
  }

  renderResult(best);
}

function renderResult(d) {
  _lastDestiny = d;
  document.getElementById('result-tag').textContent = d.tag;
  document.getElementById('result-subtitle').textContent = d.subtitle;
  document.getElementById('result-prophecy').textContent = d.prophecy;

      <div class="timeline-content">
        <div class="timeline-event">${t.event}</div>
      </div>

  traits.innerHTML = d.traits.map((t, i) => `
    <span class="trait-chip ${d.highlight.includes(i) ? 'highlight' : ''}">${t}</span>
  `).join('');

  document.getElementById('result-old-age').textContent = d.oldAge;

  switchScreen('screen-result');
  // 滚到顶部
  setTimeout(() => {
    const el = document.getElementById('screen-result');
    el.scrollTop = 0;
  }, 100);
}

function generateShareImage(d, callback) {
  if (!d) return;

  // 画布尺寸：750×1200（朋友圈竖图）
  const W = 750, H = 1200;
  const canvas = document.createElement('canvas');

  const ctx = canvas.getContext('2d');

  bg.addColorStop(0, '#0d0d1a');
  bg.addColorStop(0.5, '#1a1a2e');
  bg.addColorStop(1, '#0d0d20');

  ctx.fillRect(0, 0, W, H);

  // ── 随机星点 ──

    const y = Math.random() * H;
    const r = Math.random() * 1.2 + 0.2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 顶部光晕 ──
  const glow = ctx.createRadialGradient(W/2, 180, 0, W/2, 180, 320);
  glow.addColorStop(0, 'rgba(123,111,160,0.25)');
  glow.addColorStop(1, 'rgba(123,111,160,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, 500);

  // ── 顶部标题 ──
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(169,157,200,0.6)';
  ctx.font = '26px serif';
  ctx.fillText('时光穿梭机', W/2, 72);

  ctx.fillStyle = 'rgba(169,157,200,0.35)';
  ctx.font = '20px sans-serif';
  ctx.fillText('· 人生预言 ·', W/2, 108);

  // ── 标签徽章 ──
  const tagY = 160;
  const tagText = d.tag;
  ctx.font = 'bold 52px serif';
  ctx.fillStyle = '#e8d08a';
  ctx.fillText(tagText, W/2, tagY + 54);

  // 副标题
  ctx.font = '28px sans-serif';
  ctx.fillStyle = 'rgba(232,208,138,0.7)';
  ctx.fillText(d.subtitle, W/2, tagY + 100);

  // 分割线
  ctx.strokeStyle = 'rgba(201,168,76,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, tagY + 124); ctx.lineTo(W - 80, tagY + 124);
  ctx.stroke();

  // ── 命运预言（最多3行） ──
  const prophecyY = tagY + 158;
  ctx.font = '26px sans-serif';
  ctx.fillStyle = 'rgba(250,248,244,0.85)';
  wrapText(ctx, d.prophecy, W/2, prophecyY, W - 160, 42, 4);

  // ── 性格特质 ──
  const traitsY = prophecyY + 42 * 4 + 48;
  ctx.font = '22px sans-serif';
  ctx.fillStyle = 'rgba(169,157,200,0.7)';
  ctx.fillText('性格特质', W/2, traitsY);

  const chips = d.traits;
  const chipH = 44, chipR = 22, chipGap = 16;
  const totalChipW = chips.reduce((acc, t) => acc + measureChipW(ctx, t, chipH), 0) + chipGap * (chips.length - 1);
  let chipX = (W - totalChipW) / 2;
  const chipY = traitsY + 22;
  chips.forEach((t, i) => {
    const cw = measureChipW(ctx, t, chipH);
    const isHighlight = d.highlight.includes(i);
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, chipX, chipY, cw, chipH, chipR);
    ctx.fillStyle = isHighlight ? 'rgba(201,168,76,0.22)' : 'rgba(123,111,160,0.25)';
    ctx.fill();
    ctx.strokeStyle = isHighlight ? 'rgba(201,168,76,0.5)' : 'rgba(123,111,160,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
    ctx.fillStyle = isHighlight ? '#e8d08a' : 'rgba(250,248,244,0.85)';
    ctx.font = '22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t, chipX + cw / 2, chipY + chipH / 2 + 8);
    chipX += cw + chipGap;
  });

  // ── 底部二维码区域 ──
  const qrY = H - 240;
  ctx.strokeStyle = 'rgba(201,168,76,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, qrY - 32); ctx.lineTo(W - 80, qrY - 32);
  ctx.stroke();

  ctx.font = '20px sans-serif';
  ctx.fillStyle = 'rgba(169,157,200,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText('扫码开始你的人生预言', W/2, qrY);

  // 生成二维码并绘入
  const qrSize = 150;
  const qr = qrcode(0, 'M');
  qr.addData(SHARE_URL);
  qr.make();
  const qrImg = new Image();
  qrImg.onload = function() {
    const qrX = (W - qrSize) / 2;
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, qrX - 10, qrY + 16, qrSize + 20, qrSize + 20, 14);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = 'rgba(201,168,76,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
    ctx.drawImage(qrImg, qrX, qrY + 26, qrSize, qrSize);

    ctx.font = '18px sans-serif';
    ctx.fillStyle = 'rgba(169,157,200,0.35)';
    ctx.textAlign = 'center';
    ctx.fillText('时光穿梭机 · 看见你的一生', W/2, H - 28);

    callback(canvas.toDataURL('image/png'));
  };
  // qrcode-generator 输出 SVG data URI，转为 Image
  const svgStr = qr.createSvgTag({ scalable: true, margin: 1 });
  qrImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
}

// Canvas 工具：自动折行居中文本
function wrapText(ctx, text, cx, y, maxW, lineH, maxLines) {
  const chars = text.split('');
  let line = '';
  let lineCount = 0;
  for (let i = 0; i < chars.length; i++) {
    const test = line + chars[i];
    if (ctx.measureText(test).width > maxW && line) {
      if (lineCount >= maxLines - 1) {
        ctx.fillText(line + '…', cx, y + lineCount * lineH);
        return;
      }
      ctx.fillText(line, cx, y + lineCount * lineH);
      line = chars[i];
      lineCount++;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, cx, y + lineCount * lineH);
}

function measureChipW(ctx, text, chipH) {
  ctx.font = '22px sans-serif';
  return ctx.measureText(text).width + chipH * 1.2;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
